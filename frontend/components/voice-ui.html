<!-- Voice UI Component -->
<div class="voice-ui-container">
    <!-- Waveform Visualization -->
    <div class="waveform-container">
        <canvas id="waveform-canvas"></canvas>
        <div class="waveform-overlay"></div>
    </div>

    <!-- Voice Input Section -->
    <div class="voice-input-section">
        <div class="microphone-icon">
            <svg viewBox="0 0 24 24" width="48" height="48">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" 
                      fill="currentColor" opacity="0.6"/>
                <path d="M17 16.91c-1.48 1.46-3.51 2.36-5.77 2.36-2.26 0-4.29-.9-5.77-2.36l-1.1 1.1c1.86 1.86 4.41 2.86 6.87 2.86s5.01-1 6.87-2.86l-1.1-1.1zM12 20c2.21 0 4-1.79 4-4h-8c0 2.21 1.79 4 4 4z" 
                      fill="currentColor" opacity="0.4"/>
            </svg>
        </div>

        <div class="voice-status">
            <h3 class="voice-title">Voice Assistant</h3>
            <p class="voice-status-text">Ready to listen</p>
        </div>

        <button class="voice-button primary-button">
            <span class="voice-button-icon">🎙️</span>
            <span class="voice-button-text">Start Listening</span>
        </button>
    </div>

    <!-- Transcription Display -->
    <div class="transcription-section">
        <div class="transcription-header">
            <span>Transcription</span>
            <span class="transcription-time">0:00</span>
        </div>
        <div class="transcription-content">
            <p class="transcription-text placeholder">Your voice input will appear here...</p>
        </div>
    </div>

    <!-- Voice Commands Quick Access -->
    <div class="voice-commands">
        <div class="commands-title">Quick Commands</div>
        <div class="commands-grid">
            <button class="command-button" data-command="Help">
                <span class="command-icon">❓</span>
                <span class="command-text">Help</span>
            </button>
            <button class="command-button" data-command="Status">
                <span class="command-icon">📊</span>
                <span class="command-text">Status</span>
            </button>
            <button class="command-button" data-command="Settings">
                <span class="command-icon">⚙️</span>
                <span class="command-text">Settings</span>
            </button>
            <button class="command-button" data-command="Exit">
                <span class="command-icon">🚪</span>
                <span class="command-text">Exit</span>
            </button>
        </div>
    </div>

    <!-- Connection Status -->
    <div class="connection-status">
        <div class="connection-indicator">
            <span class="indicator-dot"></span>
            <span class="indicator-text">Connected</span>
        </div>
    </div>
</div>
