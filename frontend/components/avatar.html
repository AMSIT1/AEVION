<!-- =====================================================
     AVION Premium Avatar V2.1
     Part 1 - HTML Structure
====================================================== -->

<div id="avionAvatar" class="avion-avatar">

    <!-- Background Glow -->
    <div class="avatar-glow"></div>

    <!-- Energy Rings -->
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <!-- Floating Particles -->
    <div class="particles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- Avatar Body -->
    <div class="avatar-body">

        <!-- Neck -->
        <div class="neck"></div>

        <!-- Shoulders -->
        <div class="shoulders"></div>

        <!-- Chest Projection -->
        <div class="torso"></div>

    </div>

    <!-- Head -->
    <div class="head">

        <!-- Hair -->
        <div class="hair">

            <div class="hair-back"></div>

            <div class="hair-left"></div>

            <div class="hair-right"></div>

            <div class="hair-front"></div>

            <div class="hair-highlight"></div>

        </div>

        <!-- Face -->
        <div class="face">

            <!-- Forehead Glow -->
            <div class="forehead-glow"></div>

            <!-- Eyes -->
            <div class="eyes">

                <div class="eye left-eye">

                    <div class="iris"></div>

                    <div class="pupil"></div>

                    <div class="eye-light"></div>

                </div>

                <div class="eye right-eye">

                    <div class="iris"></div>

                    <div class="pupil"></div>

                    <div class="eye-light"></div>

                </div>

            </div>

            <!-- Eyebrows -->
            <div class="eyebrow left-brow"></div>
            <div class="eyebrow right-brow"></div>

            <!-- Nose -->
            <div class="nose"></div>

            <!-- Cheeks -->
            <div class="cheek left-cheek"></div>
            <div class="cheek right-cheek"></div>

            <!-- Mouth -->
            <div id="mouth" class="mouth">

                <div class="upper-lip"></div>

                <div class="lower-lip"></div>

            </div>

            <!-- Chin -->
            <div class="chin"></div>

        </div>

    </div>

    <!-- Hologram Base -->
    <div class="projection-base">

        <div class="projection-light"></div>

    </div>

    <!-- Name -->
    <div class="avatar-name">

        AVION

    </div>

    <!-- Status -->
    <div class="avatar-status">

        <span class="status-dot"></span>

        ONLINE

    </div>

</div>
