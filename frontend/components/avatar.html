<div class="avatar-container">

    <!-- Background Glow -->
    <div class="avatar-glow"></div>

    <!-- Rotating Rings -->
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>

    <!-- Floating Particles -->
    <div class="particles">

        <span class="particle p1"></span>
        <span class="particle p2"></span>
        <span class="particle p3"></span>
        <span class="particle p4"></span>
        <span class="particle p5"></span>

    </div>

    <!-- AI Girl -->
    <div class="girl">

        <!-- Hair -->
        <div class="hair">
            <div class="hair-back"></div>
            <div class="hair-front"></div>
        </div>

        <!-- Head -->
        <div class="head">

            <!-- Brain Light -->
            <div class="brain-light"></div>

            <!-- Face -->
            <div class="face">

                <!-- Eyes -->
                <div class="eyes">

                    <span class="eye left-eye">
                        <span class="iris"></span>
                    </span>

                    <span class="eye right-eye">
                        <span class="iris"></span>
                    </span>

                </div>

                <!-- Eyebrows -->
                <div class="eyebrows">
                    <span></span>
                    <span></span>
                </div>

                <!-- Nose -->
                <div class="nose"></div>

                <!-- Mouth -->
                <div class="mouth">
                    <span class="lip"></span>
                </div>

            </div>

        </div>

        <!-- Neck -->
        <div class="neck"></div>

        <!-- Body -->
        <div class="body">

            <div class="shoulder left"></div>
            <div class="shoulder right"></div>

            <div class="chest-core"></div>

            <div class="energy-line"></div>

        </div>

    </div>

    <!-- Orbit -->
    <div class="orbit">

        <span class="orb orb1"></span>
        <span class="orb orb2"></span>
        <span class="orb orb3"></span>

    </div>

    <!-- Status -->
    <div class="avatar-status">

        <span class="status-dot"></span>

        <span class="status-text">
            AVION ONLINE
        </span>

    </div>

</div>
