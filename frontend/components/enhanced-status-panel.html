<!-- Enhanced Status Panel -->
<div class="enhanced-status-panel">
    <div class="status-panel-header">
        <h3>System Status</h3>
        <div class="panel-indicator">
            <span class="indicator-dot"></span>
            <span class="indicator-text">Active</span>
        </div>
    </div>

    <div class="status-panel-content">
        <!-- Intelligence Level -->
        <div class="status-row">
            <div class="status-label">
                <span class="label-text">Intelligence</span>
                <span class="label-value">92%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 92%; background: linear-gradient(90deg, #00d4ff, #0099ff);"></div>
            </div>
        </div>

        <!-- Learning Capacity -->
        <div class="status-row">
            <div class="status-label">
                <span class="label-text">Learning</span>
                <span class="label-value">78%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 78%; background: linear-gradient(90deg, #ff0080, #ff3366);"></div>
            </div>
        </div>

        <!-- Voice Recognition -->
        <div class="status-row">
            <div class="status-label">
                <span class="label-text">Voice</span>
                <span class="label-value">100%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 100%; background: linear-gradient(90deg, #00ff41, #00cc33);"></div>
            </div>
        </div>

        <!-- Response Time -->
        <div class="status-row">
            <div class="status-label">
                <span class="label-text">Response</span>
                <span class="label-value">45ms</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 95%; background: linear-gradient(90deg, #9370db, #bb99ff);"></div>
            </div>
        </div>

        <!-- Energy Level -->
        <div class="status-row">
            <div class="status-label">
                <span class="label-text">Energy</span>
                <span class="label-value">87%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill energy-bar" style="width: 87%;"></div>
            </div>
        </div>
    </div>

    <div class="status-panel-footer">
        <div class="status-stat">
            <span class="stat-label">Uptime</span>
            <span class="stat-value">24:15:42</span>
        </div>
        <div class="status-stat">
            <span class="stat-label">Conversations</span>
            <span class="stat-value">1,247</span>
        </div>
        <div class="status-stat">
            <span class="stat-label">Accuracy</span>
            <span class="stat-value">96.8%</span>
        </div>
    </div>
</div>
