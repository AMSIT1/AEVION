<!-- Female AI Avatar Component -->
<div class="female-avatar-container">
    <!-- Glow Rings -->
    <div class="glow-ring glow-ring-1"></div>
    <div class="glow-ring glow-ring-2"></div>
    <div class="glow-ring glow-ring-3"></div>

    <!-- Energy Aura -->
    <div class="energy-aura"></div>

    <!-- Particle Orbit -->
    <div class="particle-orbit">
        <div class="particle-dot"></div>
        <div class="particle-dot"></div>
        <div class="particle-dot"></div>
    </div>

    <!-- Avatar Body -->
    <div class="avatar-body">
        <!-- Hair -->
        <div class="avatar-hair"></div>

        <!-- Head -->
        <div class="avatar-head">
            <!-- Eyes -->
            <div class="avatar-eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>

            <!-- Mouth -->
            <div class="avatar-mouth"></div>
        </div>

        <!-- Torso -->
        <div class="avatar-torso"></div>

        <!-- Status Lights -->
        <div class="status-lights">
            <div class="status-light"></div>
            <div class="status-light processing"></div>
            <div class="status-light learning"></div>
        </div>
    </div>
</div>
