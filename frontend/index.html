<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Avion</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/avatar.css">
</head>

<body>
    <div class="bg"></div>
    <div class="container">


        <nav>
            <div class='logo'>AVION</div>
            <div class='menu'><a>Home</a><a>Features</a><a>Docs</a><a>Contact</a><button>Talk</button></div>
        </nav>
        <main class='hero'>
            <section>

                <h1>Beyond Artificial Intelligence</h1>

                <p>
                    Designed to listen.
                    Built to assist.
                    Created for the future.
                </p>

                <button class="primary">
                    Launch Avion
                </button>

            </section>
            <aside>
                <div id="avatar-container"></div>

                <div id="status" class="status">
                    🟢 Online
                </div>

                <div id="conversation" class="conversation">

                </div>

                <button id="talkBtn" class="talk-btn">
                    🎤 Talk to Avion
                </button>

            </aside>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/avatar.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/app.js"></script>

    <script>
        fetch("components/avatar.html")
    .then(r => r.text())
    .then(html => {

        document.getElementById("avatar-container").innerHTML = html;

        if (typeof initAvatar === "function") {
            initAvatar();
        }

    });
    </script>
</body>

</html>
